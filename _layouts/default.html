<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

    <!-- li fix Minimal theme weird nested list spacing -->
    <style>
      li * {
    margin-top: 0;
    margin-bottom: 0;
      }

/* Style the summary to look like a clickable block */
summary {
  cursor: pointer;
  padding: 0.5rem;
  background-color: #f8f9fa;
  border: 1px solid #dee2e6;
  border-radius: 4px;
}

/* Ensure the heading sits inline with the native disclosure triangle */
summary h3 {
  display: inline;
  margin: 0;
  font-size: 1.2rem;
}

/* Add a visual focus ring for keyboard users */
summary:focus-visible {
  outline: 3px solid #0d6efd;
  outline-offset: 2px;
}
    </style>
</head>
<body>

  {{ content }}

    <!-- Optional: Minimal footer if needed
    <footer>
	<p><a href="alpha60.co">a60</a></p>
    </footer>

    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
     -->
</body>
</html>
